# sonar.token    -> set via SONAR_TOKEN env var
# sonar.host.url -> set via SONAR_HOST_URL env var
sonar.organization=${env.SONAR_ORGANIZATION}
sonar.projectKey=${env.SONAR_PROJECT_KEY}

sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/tests/**,**/conftest.py

sonar.exclusions=\
  .venv/**,.vscode/**,.devcontainer/**,.claude/**,.pytest_cache/**,.scannerwork/**,\
  reports/**,htmlcov/**,staticfiles/**,static/**,media/**,logs/**,docs/**,\
  **/*.json,**/*.xml,**/*.md,**/*.txt,**/*.lock,**/*.env,\
  **/*.jpg,**/*.png,**/*.svg,**/*.woff,**/*.woff2,**/*.ttf,\
  **/*.pyc,**/*.so,**/*.whl,\
  **/migrations/**,manage.py

sonar.coverage.exclusions=manage.py,**/migrations/**,event_talks/asgi.py,event_talks/wsgi.py,event_talks/settings.py
sonar.cpd.exclusions=**/tests/**,**/conftest.py,**/migrations/**
sonar.javascript.exclusions=**/templates/**

sonar.python.bandit.reportPaths=reports/bandit_report.json
sonar.python.coverage.reportPaths=reports/coverage.xml
sonar.python.ruff.reportPaths=reports/ruff_report.json
