# sonar.token    -> set via SONAR_TOKEN env var
# sonar.host.url -> set via SONAR_HOST_URL env var
sonar.organization=${env.SONAR_ORGANIZATION}
sonar.projectKey=${env.SONAR_PROJECT_KEY}

sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/tests/**,**/conftest.py

sonar.exclusions=\
  .venv/**,.vscode/**,.devcontainer/**,.claude/**,.pytest_cache/**,.scannerwork/**,\
  reports/**,htmlcov/**,staticfiles/**,static/**,media/**,logs/**,docs/**,\
  **/*.json,**/*.xml,**/*.md,**/*.txt,**/*.lock,**/*.env,\
  **/*.jpg,**/*.png,**/*.svg,**/*.woff,**/*.woff2,**/*.ttf,\
  **/*.pyc,**/*.so,**/*.whl,\
  **/migrations/**,manage.py

sonar.coverage.exclusions=manage.py,**/migrations/**,event_talks/asgi.py,event_talks/wsgi.py,event_talks/settings.py
sonar.cpd.exclusions=**/tests/**,**/conftest.py,**/migrations/**
sonar.javascript.exclusions=**/templates/**

sonar.issue.ignore.multicriteria=e1,e2,e3

# Ignore hardcoded-password rule (S2068) in test files
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.e1.resourceKey=**/tests/**

# The Dockerfile pins base images as "tag@sha256:digest" on purpose: the tag lets digestabot track
# and bump the digest, the digest gives reproducible builds. Both are required, so S8431 (use tag OR
# digest, not both) does not apply.
sonar.issue.ignore.multicriteria.e2.ruleKey=docker:S8431
sonar.issue.ignore.multicriteria.e2.resourceKey=docker/Dockerfile

# "uv sync --locked" installs from the committed uv.lock and intentionally builds the few deps that
# ship no cp314 wheel (build-base is present for that). "--no-build" would fail the build; the
# supply chain is already pinned by the lockfile, so S8541 does not apply (matches the NOSONAR in
# checks.yml).
sonar.issue.ignore.multicriteria.e3.ruleKey=docker:S8541
sonar.issue.ignore.multicriteria.e3.resourceKey=docker/Dockerfile

sonar.python.bandit.reportPaths=reports/bandit_report.json
sonar.python.coverage.reportPaths=reports/coverage.xml
sonar.python.ruff.reportPaths=reports/ruff_report.json
