# Dependabot keeps three things fresh:
#   - github-actions: the SHA-pinned actions in .github/workflows (it bumps the pinned commit SHA
#     and the trailing version comment together)
#   - uv: the Python dependencies in pyproject.toml / uv.lock
#   - docker: the base images in docker/Dockerfile and docker/compose.yaml
#
# All run weekly. Minor and patch bumps are grouped into one PR per ecosystem; major bumps arrive
# as individual PRs so breaking changes get their own review.
# The cooldown holds version bumps for a few days so a freshly published (or
# compromised-then-yanked) release is not pulled in on day zero. Cooldown never applies to security
# updates, which still open immediately.
version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
      semver-major-days: 7
    groups:
      # Packages in [project.dependencies] (django, daphne, allauth, ...). Group safe bumps; let
      # majors come through one at a time for their own review.
      python-production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      # Everything Dependabot classifies as "development": the dev/test/prod PEP 735
      # dependency-groups (ruff, zuban, pytest, AND psycopg - group members are never "production"
      # to Dependabot, even the prod group). Same rule: group minor/patch, isolate majors.
      python-development:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "docker"
    # In practice this tracks only the tag-pinned images Dependabot can resolve: postgres in
    # docker/compose.yaml. It does NOT maintain docker/Dockerfile's base images - wolfi-base is
    # pinned as ":latest@sha256:..." (Dependabot treats ":latest" as already-highest and never bumps
    # the digest) and uv is a "COPY --from" (Dependabot ignores those). Both of those digests are
    # refreshed by .github/workflows/digestabot.yml instead, and the uv version is bumped by hand.
    # No group / no update-types filter: a base-image major (postgres N) warrants its own PR.
    directory: "/docker"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
