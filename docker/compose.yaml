services:
  db:
    image: postgres:18-trixie
    container_name: ${CONTAINER_PREFIX}-postgres
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_network
    expose:
      - "5432"

  django:
    # ATTENTION: build with Bake: `COMPOSE_BAKE=true docker compose up --build`
    #            or `docker buildx bake --allow=fs.read=..` instead of `docker compose build`
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        - DJANGO_SETTINGS_MODULE=${DJANGO_SETTINGS_MODULE}
        - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
        - DJANGO_STATIC_ROOT=${DJANGO_STATIC_ROOT}
        # Must match the runtime backend in .env so the build bakes a matching manifest.
        - DJANGO_STATICFILES_STORAGE=${DJANGO_STATICFILES_STORAGE}
    container_name: ${CONTAINER_PREFIX}-django
    image: ${IMAGE_NAME:-talks-django}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    # Runtime hardening (defense in depth on top of the non-root, minimal image): drop every Linux
    # capability (Daphne binds the high port 8000 and needs none), block privilege escalation, and
    # run with a read-only root filesystem. The app writes only to the mounted media/logs volumes
    # and to /tmp (matplotlib cache + HOME), so /tmp is a small writable tmpfs.
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ${MOUNT_MEDIA_ROOT}:${DJANGO_MEDIA_ROOT}
      - ${MOUNT_LOGS_DIR}:${DJANGO_LOGS_DIR}
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      # Pure-Python probe (no curl/wget in the hardened image); asserts HTTP 200 so a redirect or
      # degraded response is not read as healthy.
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/ht/?format=json', timeout=8).status == 200 else 1)"]
      # Short interval + a start_period that covers entrypoint migrations: the container flips to
      # "healthy" within ~15s of the app answering, so a deploy's health gate (deploy-event.sh)
      # confirms quickly instead of waiting out a long interval and wrongly rolling back.
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - app_network

volumes:
  pgdata:
    driver: local
    name: ${CONTAINER_PREFIX}-pgdata

networks:
  app_network:
    driver: bridge
    name: ${CONTAINER_PREFIX}-network
