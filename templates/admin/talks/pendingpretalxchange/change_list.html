{% extends "admin/change_list.html" %}
{% load i18n admin_urls %}
{% block object-tools-items %}
  <li>
    {# POST form (not a link): the action mutates state, so it must be CSRF-protected. #}
    <form method="post"
          action="{% url 'admin:talks_pendingpretalxchange_check_now' %}"
          style="display: inline">
      {% csrf_token %}
      <button type="submit"
              class="historylink"
              style="border: 0;
                     background: none;
                     padding: 0;
                     cursor: pointer">{% translate "Check Pretalx now" %}</button>
    </form>
  </li>
  {{ block.super }}
{% endblock object-tools-items %}
